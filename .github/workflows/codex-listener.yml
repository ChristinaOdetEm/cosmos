name: Codex Listener

# Shared workflow pattern:
# - governed from Monoscape/monoscape.config.json
# - reviewed through issue/PR comments
# - merged only after the review decision allows it
on:
  issues:
    types:
      - opened
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - name: Route issue and PR commands
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const labelSpecs = {
              "worker:queued": { color: "1f7a8c", description: "Waiting for Windows Worker" },
              "worker:claimed": { color: "0f6b8a", description: "Windows Worker is inspecting" },
              "codex:running": { color: "0f4c5c", description: "Codex is actively working" },
              "codex:needs-fix": { color: "c94f4f", description: "Changes requested in the current turn" },
              "oryn:needs-review": { color: "d98e04", description: "Waiting on Oryn review" },
              "oryn:merge": { color: "2f855a", description: "Structural review passed; merge eligible" },
            };

            const commandPattern = /\/codex\s+([a-z-]+)(?:\s+(.*))?$/im;
            const isIssueOpened = context.eventName === "issues" && context.payload.action === "opened";

            async function ensureLabel(name) {
              const spec = labelSpecs[name];
              if (!spec) return;
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color: spec.color,
                  description: spec.description,
                });
              }
            }

            async function addLabels(issue_number, names) {
              const existing = new Set();
              const current = await github.paginate(github.rest.issues.listLabelsOnIssue, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              for (const label of current) {
                existing.add(label.name);
              }

              const toAdd = names.filter((name) => !existing.has(name));
              for (const name of toAdd) {
                await ensureLabel(name);
              }

              if (toAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: toAdd,
                });
              }
            }

            async function leaveComment(issue_number, body) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

            function commandFrom(body) {
              if (!body) return null;
              const match = body.match(commandPattern);
              if (!match) return null;
              return {
                name: match[1].toLowerCase(),
                arg: (match[2] || "").trim(),
              };
            }

            function isAuthorized() {
              const association = context.payload.comment?.author_association
                || context.payload.review?.author_association
                || context.payload.issue?.author_association
                || "";
              return ["OWNER", "MEMBER", "COLLABORATOR"].includes(association);
            }

            function targetNumber() {
              return context.payload.issue?.number
                || context.payload.pull_request?.number
                || context.payload.pull_request_review?.number
                || null;
            }

            async function getCurrentLabels(issue_number) {
              const labels = await github.paginate(github.rest.issues.listLabelsOnIssue, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              return labels.map((label) => label.name).sort();
            }

            if (isIssueOpened) {
              await addLabels(context.payload.issue.number, ["worker:queued"]);
              await leaveComment(
                context.payload.issue.number,
                [
                  "Issue queued for Windows Worker pickup.",
                  "",
                  "Use `/codex status` to inspect labels.",
                ].join("\n")
              );
              return;
            }

            const body = context.payload.comment?.body
              || context.payload.review?.body
              || "";
            const command = commandFrom(body);
            if (!command) {
              core.notice("No /codex command found.");
              return;
            }

            const issueNumber = targetNumber();
            if (!issueNumber) {
              core.notice("No issue or PR number found for this event.");
              return;
            }

            if (command.name === "status") {
              const labels = await getCurrentLabels(issueNumber);
              await leaveComment(
                issueNumber,
                [`Current labels: ${labels.length ? labels.join(", ") : "none"}.`, `Command received: /codex status${command.arg ? ` ${command.arg}` : ""}.`].join("\n")
              );
              return;
            }

            if (command.name === "start" || command.name === "next") {
              await addLabels(issueNumber, ["worker:queued", "worker:claimed", "codex:running"]);
              await leaveComment(issueNumber, "Acknowledged. I am starting this next step.");
              return;
            }

            if (command.name === "fix") {
              await addLabels(issueNumber, ["codex:needs-fix"]);
              await leaveComment(issueNumber, "Acknowledged. I will revise the branch and respond.");
              return;
            }

            if (command.name === "review") {
              await addLabels(issueNumber, ["oryn:needs-review"]);
              await leaveComment(issueNumber, "Acknowledged. I will keep this in Oryn review state until the next update.");
              return;
            }

            if (command.name === "ready") {
              await addLabels(issueNumber, ["oryn:merge"]);
              await leaveComment(issueNumber, "Acknowledged. Structural review passed; this is merge eligible.");
              return;
            }

            if (command.name === "merge") {
              const isPullRequest = Boolean(context.payload.pull_request || context.payload.issue?.pull_request);
              if (!isPullRequest) {
                await leaveComment(issueNumber, "Merge only applies to pull requests.");
                return;
              }

              if (!isAuthorized()) {
                await leaveComment(issueNumber, "Merge requests are limited to repository owners, members, or collaborators.");
                return;
              }

              const prNumber = context.payload.pull_request?.number || context.payload.issue?.number || issueNumber;
              const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              if (pr.data.draft) {
                await leaveComment(prNumber, "PR is still draft. Mark it ready for review first.");
                return;
              }

              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: prNumber,
                  merge_method: "merge",
                });
                await leaveComment(prNumber, "PR merged by Codex listener.");
              } catch (error) {
                await leaveComment(prNumber, `Merge attempt failed: ${error.message}`);
                throw error;
              }
              return;
            }

            await leaveComment(
              issueNumber,
              [
                `Unknown command: /codex ${command.name}${command.arg ? ` ${command.arg}` : ""}.`,
                "Try `/codex start`, `/codex fix`, `/codex review`, `/codex ready`, `/codex status`, or `/codex merge`.",
              ].join("\n")
            );
